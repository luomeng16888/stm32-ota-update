<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>添加设备 - OTA管理平台</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--accent:#3b82f6;--accent-light:rgba(59,130,246,0.08);--bg:#f5f6fa;--card:#fff;--border:#e8ecf1;--text-primary:#1e293b;--text-secondary:#64748b;--text-muted:#94a3b8;--purple:#8b5cf6;--radius:14px;--radius-sm:10px;--font-body:'Noto Sans SC',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;--shadow-sm:0 1px 3px rgba(0,0,0,0.04);--shadow:0 4px 16px rgba(0,0,0,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm)}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
.topbar h5{font-weight:700;font-size:1.05rem;margin:0}
.topbar a{color:var(--text-muted);text-decoration:none;font-size:0.85rem;font-weight:500}a:hover{color:var(--accent)}
.container{max-width:560px;margin:32px auto;padding:0 20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{border:1px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow-sm);overflow:hidden;animation:fadeUp 0.5s ease both}
.card-header{padding:16px 22px;border-bottom:1px solid var(--border);font-weight:600;font-size:0.95rem;display:flex;align-items:center;gap:10px}
.card-body{padding:22px}
.form-label{font-weight:600;font-size:0.82rem;color:var(--text-secondary);margin-bottom:6px}
.form-control,.form-select{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.88rem;transition:all 0.2s}
.form-control:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.btn{font-weight:600;font-size:0.85rem;border-radius:var(--radius-sm);padding:10px 20px;transition:all 0.25s;border:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,0.3)}
.btn-primary:hover{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;transform:translateY(-1px)}
.alert{border:none;border-radius:var(--radius-sm);font-size:0.88rem;font-weight:500;padding:14px 18px;margin-bottom:20px}
.alert-info{background:var(--accent-light);color:var(--accent);border-left:4px solid var(--accent)}
</style>
</head>
<body>
<div class="topbar">
    <div class="topbar-left"><div class="logo">O</div><h5>OTA 管理平台</h5></div>
    <a href="/user">返回设备列表</a>
</div>
<div class="container">
    {% with messages = get_flashed_messages() %}
    {% if messages %}{% for msg in messages %}<div class="alert alert-info">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <div class="card">
        <div class="card-header"><span>📡</span> 添加新设备</div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">设备 ID</label>
                    <input class="form-control" name="device_id" placeholder="如 STM32_001" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">设备型号</label>
                    <input class="form-control" name="device_model" value="STM32F407ZGT6">
                </div>
                <div class="mb-3">
                    <label class="form-label">WiFi 名称 (可选)</label>
                    <input class="form-control" name="wifi_ssid" placeholder="WiFi SSID">
                </div>
                <div class="mb-3">
                    <label class="form-label">WiFi 密码 (可选)</label>
                    <input class="form-control" name="wifi_password" type="password" placeholder="WiFi 密码">
                </div>
                <button class="btn btn-primary w-100" type="submit">添加设备</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
